apiVersion: apps/v1
kind: Deployment

metadata:
  name: catalog-server-deployment
  labels:
    app: catalog-service

spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      containers:
        - name: catalog-server
          image: catalog-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
